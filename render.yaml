# Prefer placing this at repo root if Root Directory is not set to `backend`.
# See also backend/render.yaml when Root Directory = backend.

services:
  - type: web
    name: hkbams-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
